services:
  - type: web
    name: task-manager
    env: python
    plan: free
    buildCommand: |
      cd backend && pip install -r requirements.txt
      cd ../frontend && npm install && npm run build
    startCommand: |
      cd backend && gunicorn --chdir . run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        value: change-me
      - key: JWT_SECRET_KEY
        value: change-me
      - key: CORS_ORIGINS
        value: https://task-manager.onrender.com
      - key: FRONTEND_DIST_PATH
        value: ../frontend/dist
